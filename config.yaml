# SophiaAgent Configuration
# Set SOPHIA_API_KEY, SOPHIA_BASE_URL, and SOPHIA_MODEL environment variables,
# or run `sophia init` to configure interactively.
model:
  provider: openai-compat
  name: ${SOPHIA_MODEL}
  base_url: ${SOPHIA_BASE_URL}
  api_key: ${SOPHIA_API_KEY}
  max_turns: 50

session:
  db_path: ~/.sophia-agent/sessions.db
  workspace: ~/SophiaWorkspace

export:
  latex_engine: xelatex
  default_format: pdf
  citation_style: gb-t-7714-2015

tools:
  literature_search:
    semantic_scholar_api_key: ""
    arxiv_enabled: true
    crossref_enabled: true
  analysis:
    sandbox: true
    timeout: 120
